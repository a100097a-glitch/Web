<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="錢包日誌">
<title>錢包日誌</title>
<style>
:root{
  --bg:#FAFAF8; --surface:#FFFFFF; --surface-2:#F3F2ED;
  --border:rgba(0,0,0,0.09); --border-strong:rgba(0,0,0,0.16);
  --text:#1A1A18; --text-secondary:#6B6A63; --text-muted:#9B9A92;
  --accent:#0F6E56; --accent-bg:#E1F5EE;
  --danger:#993C1D; --danger-bg:#FAECE7;
  --radius:10px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#17181A; --surface:#212327; --surface-2:#292B2F;
    --border:rgba(255,255,255,0.10); --border-strong:rgba(255,255,255,0.2);
    --text:#F0F0EE; --text-secondary:#A9A9A2; --text-muted:#77766F;
    --accent:#5DCAA5; --accent-bg:#0F3A31;
    --danger:#F0997B; --danger-bg:#4A2318;
  }
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; -webkit-font-smoothing:antialiased;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:14px; padding:8px 10px; border-radius:8px; border:0.5px solid var(--border-strong); background:var(--surface); color:var(--text);}
.btn{display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:8px; border:0.5px solid var(--border-strong); background:var(--surface); color:var(--text); font-size:14px; transition:background .15s;}
.btn:hover{background:var(--surface-2);}
.btn-primary{background:var(--accent); color:#fff; border-color:var(--accent);}
.btn-primary:hover{opacity:.9;}
.btn-danger{color:var(--danger); border-color:var(--danger); background:none;}
.btn-danger:hover{background:var(--danger-bg);}
.icon{width:18px; height:18px; flex-shrink:0;}
.app{display:flex; min-height:100vh; max-width:1180px; margin:0 auto;}
.sidebar{width:180px; flex-shrink:0; padding:24px 12px; border-right:0.5px solid var(--border); display:flex; flex-direction:column; gap:2px;}
.sidebar h1{font-size:17px; font-weight:500; padding:0 10px 20px; margin:0;}
.navitem{display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:8px; color:var(--text-secondary); font-size:14px; background:none; border:none; text-align:left; width:100%;}
.navitem:hover{background:var(--surface-2);}
.navitem.active{background:var(--accent-bg); color:var(--accent); font-weight:500;}
.content{flex:1; padding:24px 32px; min-width:0;}
.tab{display:none;}
.tab.active{display:block;}
.row-between{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
h2.pagetitle{font-size:20px; font-weight:500; margin:0;}
.cards{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:20px;}
.card{background:var(--surface-2); border-radius:var(--radius); padding:16px;}
.card p.label{font-size:13px; color:var(--text-secondary); margin:0 0 6px;}
.card p.value{font-size:22px; font-weight:500; margin:0;}
.panel{background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:20px 24px;}
.calendar-wrap{display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start;}
.cal-col{min-width:0;}
.cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.cal-nav span{font-size:15px; font-weight:500;}
.cal-nav button{background:none; border:none; color:var(--text-secondary); padding:4px;}
.weekdays{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:11px; color:var(--text-muted); margin-bottom:4px;}
.caldays{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
.calday{text-align:center; padding:6px 0; border-radius:6px; font-size:12px; color:var(--text-secondary); background:none; border:none; position:relative;}
.calday:hover{background:var(--surface-2);}
.calday.selected{background:var(--accent); color:#fff; font-weight:500;}
.calday .dot{width:4px; height:4px; border-radius:50%; background:var(--text-muted); margin:2px auto 0;}
.calday.selected .dot{background:#fff;}
.detail-col{flex:1; min-width:0;}
.txn-row{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:0.5px solid var(--border);}
.txn-row:last-child{border-bottom:none;}
.cat-badge{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; font-size:15px;}
.txn-info{flex:1; min-width:0;}
.txn-info p{margin:0;}
.txn-name{font-size:14px;}
.txn-meta{font-size:12px; color:var(--text-secondary); margin-top:2px !important;}
.txn-amount{font-size:14px; font-weight:500; white-space:nowrap;}
.txn-actions{display:flex; gap:4px; margin-left:8px;}
.txn-actions button{background:none; border:none; color:var(--text-muted); padding:4px;}
.txn-actions button:hover{color:var(--text);}
.empty{color:var(--text-muted); font-size:14px; padding:24px 0; text-align:center;}
.list-row{display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:0.5px solid var(--border);}
.list-row:last-child{border-bottom:none;}
table{width:100%; border-collapse:collapse; font-size:13px;}
th{text-align:right; font-size:12px; color:var(--text-muted); font-weight:400; padding:8px 4px; border-bottom:0.5px solid var(--border);}
th:first-child, td:first-child{text-align:left;}
td{padding:10px 4px; border-bottom:0.5px solid var(--border); text-align:right;}
.modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface); border-radius:12px; padding:22px 24px; width:100%; max-width:400px; max-height:90vh; overflow-y:auto;}
.modal h3{margin:0 0 16px; font-size:17px; font-weight:500;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px;}
.field input, .field select{width:100%;}
.toggle-group{display:flex; gap:8px; margin-bottom:14px;}
.toggle-btn{flex:1; padding:9px; border-radius:8px; border:0.5px solid var(--border-strong); background:var(--surface); text-align:center; font-size:14px; color:var(--text-secondary);}
.toggle-btn.active{background:var(--accent-bg); color:var(--accent); border-color:var(--accent); font-weight:500;}
.modal-actions{display:flex; gap:8px; margin-top:18px;}
.modal-actions button{flex:1;}
.text-pos{color:var(--accent);}
.text-neg{color:var(--danger);}
.month-picker{display:flex; align-items:center; gap:12px;}
.month-picker button{background:none; border:none; color:var(--text-secondary);}
.bar-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
.bar-label{width:50px; font-size:12px; color:var(--text-secondary); flex-shrink:0;}
.bar-track{flex:1; height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden;}
.bar-fill{height:100%; border-radius:4px;}
.bar-value{width:80px; text-align:right; font-size:12px; color:var(--text-secondary); flex-shrink:0;}
@media (max-width:760px){
  .app{flex-direction:column;}
  .sidebar{width:100%; flex-direction:row; overflow-x:auto; border-right:none; border-bottom:0.5px solid var(--border); padding:12px;}
  .sidebar h1{display:none;}
  .navitem{white-space:nowrap; width:auto;}
  .calendar-wrap{grid-template-columns:1fr;}
  .cal-col{width:100%;}
  .cards{grid-template-columns:1fr 1fr !important;}
}
input[type="date"], input[type="month"] {
   text-align: left; -webkit-appearance: none; appearance: none; background-color: var(--surface); min-height: 35px;
}
input[type="date"]::-webkit-date-and-time-value, input[type="month"]::-webkit-date-and-time-value { text-align: left; }
</style>
</head>
<body>

<div class="app" id="main-app">
  <nav class="sidebar">
    <h1>錢包日誌</h1>
    <button class="navitem active" data-tab="calendar"></button>
    <button class="navitem" data-tab="analysis"></button>
    <button class="navitem" data-tab="accounts"></button>
    <button class="navitem" data-tab="invest"></button>
    <button class="navitem" data-tab="settings"></button>
  </nav>

  <main class="content">
    <section id="tab-calendar" class="tab active"></section>
    <section id="tab-analysis" class="tab"></section>
    <section id="tab-accounts" class="tab"></section>
    <section id="tab-invest" class="tab"></section>
    <section id="tab-settings" class="tab"></section>
  </main>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-content" class="modal"></div>
</div>

<input type="file" id="importFile" accept="application/json" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ---------- icons ---------- */
const ICON = {
  calendar:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>',
  chart:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>',
  wallet:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M16 14h2"/></svg>',
  trend:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 16l6-6 4 4 6-8M14 6h6v6"/></svg>',
  settings:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M4 12h2M18 12h2M12 4v2M12 18v2M6.3 6.3l1.4 1.4M16.3 16.3l1.4 1.4M6.3 17.7l1.4-1.4M16.3 7.7l1.4-1.4"/></svg>',
  plus:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 5v14M5 12h14"/></svg>',
  trash:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>',
  edit:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 20h4L18 10l-4-4L4 16v4z"/></svg>',
  x:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  chevL:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M15 6l-6 6 6 6"/></svg>',
  chevR:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 6l6 6-6 6"/></svg>',
  chevUp:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" style="width:15px;height:15px;"><path d="M6 15l6-6 6 6"/></svg>',
  chevDown:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" style="width:15px;height:15px;"><path d="M6 9l6 6 6-6"/></svg>',
  download:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 4v12M6 12l6 6 6-6M5 20h14"/></svg>',
  upload:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 20V8M6 12l6-6 6 6M5 20h14"/></svg>',
  refresh:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M20 11a8 8 0 10-2.3 5.7M20 5v6h-6"/></svg>'
};
document.querySelector('[data-tab=calendar]').innerHTML = ICON.calendar+'月曆';
document.querySelector('[data-tab=analysis]').innerHTML = ICON.chart+'分析';
document.querySelector('[data-tab=accounts]').innerHTML = ICON.wallet+'帳戶';
document.querySelector('[data-tab=invest]').innerHTML = ICON.trend+'投資';
document.querySelector('[data-tab=settings]').innerHTML = ICON.settings+'設定';

const DEFAULT_EXPENSE_CATS = [
  {name:'餐飲', color:'#D85A30'}, {name:'交通', color:'#7F77DD'}, {name:'娛樂', color:'#D4537E'},
  {name:'居家', color:'#1D9E75'}, {name:'購物', color:'#BA7517'}, {name:'醫療', color:'#378ADD'}, {name:'其他', color:'#888780'}
];
const DEFAULT_INCOME_CATS = [
  {name:'薪資', color:'#1D9E75'}, {name:'獎金', color:'#BA7517'}, {name:'投資收益', color:'#7F77DD'}, {name:'其他', color:'#888780'}
];
const CAT_PALETTE = ['#D85A30','#7F77DD','#D4537E','#1D9E75','#BA7517','#378ADD','#888780','#0F6E56','#993C1D','#2E7DBD'];
function catColor(name){
  const all = state.categories.expense.concat(state.categories.income);
  const f = all.find(c=>c.name===name);
  return f ? f.color : '#888780';
}

const TAIWAN_STOCKS = [
  {symbol:'1101', name:'台泥'}, {symbol:'2330', name:'台積電'}, {symbol:'2454', name:'聯發科'},
  {symbol:'2317', name:'鴻海'}, {symbol:'0050', name:'元大台灣50'}, {symbol:'0056', name:'元大高股息'},
  {symbol:'00878', name:'國泰永續高股息'}, {symbol:'00919', name:'群益台灣精選高息'}
]; // 為節省空間已精簡，可自行補回完整清單

/* ---------- state ---------- */
const today = new Date();
const pad = n => String(n).padStart(2,'0');
const dateStr = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;

let state = {
  categories: {
    expense: DEFAULT_EXPENSE_CATS.map(c=>({...c})),
    income: DEFAULT_INCOME_CATS.map(c=>({...c}))
  },
  accounts: [], transactions: [], stockRecords: [], feeRecords: [], customStocks: []
};

// 【系統唯一加密架構設定】
const STORAGE_KEY = 'walletJournal_state_v3_encrypted'; 
const LEGACY_STORAGE_KEY = 'walletJournal_state_v2'; 
let sessionKey = null; 
let isLocked = false; // 保護變數：當需要密碼解鎖時，鎖定存檔功能

function saveState(){
  if(isLocked) return; // 如果還沒解鎖，絕對不允許存檔覆寫！
  try{
    const jsonStr = JSON.stringify(state);
    if(sessionKey) {
      const encrypted = CryptoJS.AES.encrypt(jsonStr, sessionKey).toString();
      localStorage.setItem(STORAGE_KEY, encrypted);
      localStorage.removeItem(LEGACY_STORAGE_KEY);
    } else {
      localStorage.setItem(LEGACY_STORAGE_KEY, jsonStr);
      localStorage.removeItem(STORAGE_KEY);
    }
  }catch(e){ console.warn('無法儲存資料', e); }
}

/* ---------- 啟動解鎖邏輯 ---------- */
window.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem(STORAGE_KEY);
  const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
  
  if(raw) {
    // 若有加密資料，鎖定系統並彈出輸入密碼視窗
    isLocked = true;
    renderAll(); // 渲染一個空殼 UI，保護資料
    openUnlockModal();
  } else {
    // 若無加密資料 (全新 或 舊版明文)，直接載入
    if(legacyRaw) {
      try {
        const saved = JSON.parse(legacyRaw);
        if(saved && saved.categories){ state = saved; }
      } catch(e) {}
    }
    renderAll();
  }
});

function openUnlockModal() {
  openModal(`
    <div style="text-align:center; padding: 10px 0;">
      <h3 style="margin-bottom:8px;">解鎖本地資料</h3>
      <p style="font-size:13px; color:var(--text-secondary); margin-bottom:20px;">資料已受加密保護，請輸入密碼以解鎖。</p>
      <div class="field" style="margin-bottom:16px;">
        <input type="password" id="app-password" placeholder="輸入解密密碼..." style="width:100%; text-align:center; font-size:15px; padding:10px;">
      </div>
      <button class="btn btn-primary" id="btn-unlock" style="width:100%; justify-content:center; padding:10px; font-size:15px;">解密資料</button>
      <p id="login-error" class="error" style="display:none; color:var(--danger); font-size:13px; margin-top:12px; margin-bottom:0;">密碼錯誤，無法解密！</p>
    </div>
  `);
  document.getElementById('btn-unlock').addEventListener('click', handleUnlock);
  document.getElementById('app-password').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') handleUnlock();
  });
}

function handleUnlock() {
  const pwd = document.getElementById('app-password').value;
  if(!pwd) return;
  const raw = localStorage.getItem(STORAGE_KEY);
  try {
    const bytes = CryptoJS.AES.decrypt(raw, pwd);
    const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
    if(!decryptedStr) throw new Error("解密失敗");

    const saved = JSON.parse(decryptedStr);
    if(saved && saved.categories){
      if(!saved.accounts) saved.accounts = [];
      if(!saved.transactions) saved.transactions = [];
      if(!saved.stockRecords) saved.stockRecords = [];
      if(!saved.feeRecords) saved.feeRecords = [];
      if(!saved.customStocks) saved.customStocks = [];
      state = saved;
    }
    
    sessionKey = pwd; // 記錄密碼
    isLocked = false; // 解除鎖定
    closeModal();
    renderAll(); // 重新渲染含有資料的 UI
    
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

/* ---------- tab switching ---------- */
let calYear = today.getFullYear(), calMonth = today.getMonth();
let selectedDay = today.getDate();
let analysisYear = today.getFullYear(), analysisMonth = today.getMonth(), analysisMode = 'month';
let invYear = today.getFullYear(), invMonth = today.getMonth(), invMode = 'month';
let settingsOpen = { categories:false, stocks:false, security:false };

function uid(){ return 'id'+Math.random().toString(36).slice(2,9); }
function fmt(n){ return Math.round(n).toLocaleString('zh-Hant'); }
function fmt2(n){ return n.toLocaleString('zh-Hant',{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(dstr){ const d = new Date(dstr); return `${d.getMonth()+1}/${d.getDate()}`; }

function accountBalance(acc){
  let bal = acc.balance;
  state.transactions.forEach(t=>{
    if(t.account===acc.id){ bal += t.type==='income' ? t.amount : -t.amount; }
  });
  return bal;
}

document.querySelectorAll('.navitem').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.navitem').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    renderAll();
  });
});

/* ---------- modal helpers ---------- */
const overlay = document.getElementById('modal-overlay');
const modalContent = document.getElementById('modal-content');
function openModal(html){ modalContent.innerHTML = html; overlay.classList.remove('hidden'); }
function closeModal(){ overlay.classList.add('hidden'); modalContent.innerHTML=''; }
// 如果系統被鎖定，點擊旁邊的暗色遮罩不能關閉視窗！
overlay.addEventListener('click', e=>{ if(e.target===overlay && !isLocked) closeModal(); });

/* ---------- calendar tab ---------- */
function renderCalendar(){
  const monthTxns = state.transactions.filter(t=>{
    const d = new Date(t.date);
    return d.getFullYear()===calYear && d.getMonth()===calMonth;
  });
  const income = monthTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = monthTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysWithData = new Set(monthTxns.map(t=>new Date(t.date).getDate()));

  let calCells = '';
  for(let i=0;i<firstDay;i++) calCells += '<div></div>';
  for(let d=1; d<=daysInMonth; d++){
    const isSel = d===selectedDay;
    calCells += `<button class="calday ${isSel?'selected':''}" data-day="${d}">${d}${daysWithData.has(d)?'<div class="dot"></div>':'<div style="height:6px"></div>'}</button>`;
  }

  const dayTxns = state.transactions.filter(t=>t.date===dateStr(calYear,calMonth,selectedDay))
    .sort((a,b)=>a.id<b.id?1:-1);
  const dayIncome = dayTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const dayExpense = dayTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  const weekday = new Date(calYear,calMonth,selectedDay).toLocaleDateString('zh-Hant-TW',{month:'long',day:'numeric',weekday:'long'});

  let txnHtml = dayTxns.length ? dayTxns.map(t=>`
    <div class="txn-row">
      <div class="cat-badge" style="background:${catColor(t.category)}">${t.category.slice(0,1)}</div>
      <div class="txn-info">
        <p class="txn-name">${t.note||t.category}</p>
        <p class="txn-meta">${t.category}</p>
      </div>
      <span class="txn-amount ${t.type==='income'?'text-pos':''}">${t.type==='income'?'+':'-'}NT$ ${fmt(t.amount)}</span>
      <div class="txn-actions">
        <button data-edit="${t.id}" aria-label="編輯">${ICON.edit}</button>
        <button data-del="${t.id}" aria-label="刪除">${ICON.trash}</button>
      </div>
    </div>`).join('') : '<div class="empty">這天還沒有記錄</div>';

  document.getElementById('tab-calendar').innerHTML = `
    <div class="row-between">
      <h2 class="pagetitle">月曆</h2>
      <button class="btn btn-primary" id="btnAddTxn">${ICON.plus}快速記帳</button>
    </div>
    <div class="calendar-wrap panel">
      <div class="cal-col">
        <div class="cal-nav">
          <button data-nav="-1">${ICON.chevL}</button>
          <div style="position:relative; font-size:15px; font-weight:500; display:inline-flex; align-items:center; justify-content:center;">
            <span>${calYear} 年 ${calMonth+1} 月 ▾</span>
            <input type="month" id="calPicker" value="${calYear}-${pad(calMonth+1)}" style="position:absolute; left:0; top:0; width:100%; height:100%; opacity:0; cursor:pointer; padding:0; margin:0;">
          </div>
          <button data-nav="1">${ICON.chevR}</button>
        </div>
        <div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
        <div class="caldays">${calCells}</div>
      </div>
      <div class="detail-col">
        <div class="row-between" style="margin-bottom:12px;">
          <div>
            <p style="font-size:16px; font-weight:500; margin:0;">${weekday}</p>
            <p style="font-size:12px; color:var(--text-secondary); margin:4px 0 0;">收入 NT$ ${fmt(dayIncome)} · 支出 NT$ ${fmt(dayExpense)}</p>
          </div>
        </div>
        ${txnHtml}
      </div>
    </div>
  `;

  document.querySelectorAll('.calday').forEach(b=>b.addEventListener('click', ()=>{ selectedDay=parseInt(b.dataset.day); renderCalendar(); }));
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click', ()=>{
    calMonth += parseInt(b.dataset.nav);
    if(calMonth<0){calMonth=11; calYear--;} if(calMonth>11){calMonth=0; calYear++;}
    const dim = new Date(calYear,calMonth+1,0).getDate();
    if(selectedDay>dim) selectedDay=dim;
    renderCalendar();
  }));
  document.getElementById('calPicker')?.addEventListener('change', (e) => {
    if(!e.target.value) return;
    const [y, m] = e.target.value.split('-');
    calYear = parseInt(y, 10);
    calMonth = parseInt(m, 10) - 1;
    const dim = new Date(calYear, calMonth+1, 0).getDate();
    if(selectedDay > dim) selectedDay = dim;
    renderCalendar();
  });

  document.getElementById('btnAddTxn').addEventListener('click', ()=>openTxnModal());
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openTxnModal(b.dataset.edit)));
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
    state.transactions = state.transactions.filter(t=>t.id!==b.dataset.del);
    renderCalendar();
  }));
}

function openTxnModal(editId, draft){
  const editing = editId ? state.transactions.find(t=>t.id===editId) : null;
  let type = editing ? editing.type : (draft ? draft.type : 'expense');
  const dstr = editing ? editing.date : (draft ? draft.date : dateStr(calYear,calMonth,selectedDay));

  function catOptions(){
    const cats = state.categories[type];
    const selected = editing ? editing.category : (draft ? draft.category : null);
    return cats.map(c=>`<option value="${c.name}" ${selected===c.name?'selected':''}>${c.name}</option>`).join('')
      || '<option value="">（尚無分類，請先新增）</option>';
  }
  function accOptions(){
    const selected = editing ? editing.account : (draft ? draft.account : null);
    const noneOpt = `<option value="" ${!selected?'selected':''}>不指定帳戶</option>`;
    if(!state.accounts.length) return noneOpt;
    return noneOpt + state.accounts.map(a=>`<option value="${a.id}" ${selected===a.id?'selected':''}>${a.name}（NT$ ${fmt(accountBalance(a))}）</option>`).join('');
  }

  openModal(`
    <h3>${editing?'編輯交易':'快速記帳'}</h3>
    <div class="toggle-group">
      <button type="button" class="toggle-btn ${type==='expense'?'active':''}" data-type="expense">支出</button>
      <button type="button" class="toggle-btn ${type==='income'?'active':''}" data-type="income">收入</button>
    </div>
    <div class="field"><label>金額</label><input type="number" id="f-amount" value="${editing?editing.amount:(draft?draft.amount:'')}" placeholder="0"></div>
    <div class="field">
      <label>分類</label>
      <div style="display:flex; gap:8px;">
        <select id="f-cat" style="flex:1;">${catOptions()}</select>
        <button type="button" class="btn" id="btnManageCat" style="padding:8px 10px;" aria-label="管理分類">${ICON.settings}</button>
      </div>
    </div>
    <div class="field"><label>帳戶</label><select id="f-acc">${accOptions()}</select></div>
    <div class="field"><label>日期</label><input type="date" id="f-date" value="${dstr}"></div>
    <div class="field"><label>備註</label><input type="text" id="f-note" value="${editing?(editing.note||''):(draft?draft.note:'')}" placeholder="例如：午餐"></div>
    <div class="modal-actions">
      <button class="btn" id="btnCancel">取消</button>
      <button class="btn btn-primary" id="btnSave">儲存</button>
    </div>
  `);

  document.querySelectorAll('.toggle-btn').forEach(b=>b.addEventListener('click', ()=>{
    type = b.dataset.type;
    document.querySelectorAll('.toggle-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('f-cat').innerHTML = catOptions();
  }));
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnManageCat').addEventListener('click', ()=>{
    closeModal();
    document.querySelectorAll('.navitem').forEach(b=>b.classList.toggle('active', b.dataset.tab==='settings'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-settings').classList.add('active');
    settingsOpen.categories = true;
    renderSettings();
  });
  document.getElementById('btnSave').addEventListener('click', ()=>{
    const amount = parseFloat(document.getElementById('f-amount').value);
    if(!amount || amount<=0){ alert('請輸入有效金額'); return; }
    const category = document.getElementById('f-cat').value;
    if(!category){ alert('請先新增至少一個分類'); return; }
    const account = document.getElementById('f-acc').value;
    const payload = {
      type, amount, category, account,
      date: document.getElementById('f-date').value,
      note: document.getElementById('f-note').value
    };
    if(editing){ Object.assign(editing, payload); }
    else { state.transactions.push({id:uid(), ...payload}); }
    closeModal();
    const d = new Date(payload.date);
    calYear=d.getFullYear(); calMonth=d.getMonth(); selectedDay=d.getDate();
    renderAll();
  });
}

/* ---------- analysis tab ---------- */
let analysisChart = null, trendChart = null;
function renderAnalysis(){
  const isYear = analysisMode === 'year';

  const scopedTxns = state.transactions.filter(t=>{
    const d = new Date(t.date);
    if(d.getFullYear()!==analysisYear) return false;
    return isYear ? true : d.getMonth()===analysisMonth;
  });
  const expenseTxns = scopedTxns.filter(t=>t.type==='expense');
  const income = scopedTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = expenseTxns.reduce((s,t)=>s+t.amount,0);

  const byCat = {};
  expenseTxns.forEach(t=>{ byCat[t.category] = (byCat[t.category]||0) + t.amount; });
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  const periodLabel = isYear ? '本年' : '本月';
  
  const yearSelectHtml = (() => {
    let opts = '';
    for(let y = 2015; y <= 2045; y++) {
      opts += `<option value="${y}" ${y === analysisYear ? 'selected' : ''}>${y} 年</option>`;
    }
    return `<select id="anaYearPicker" style="position:absolute; left:0; top:0; width:100%; height:100%; opacity:0; cursor:pointer; padding:0; margin:0;">${opts}</select>`;
  })();

  const picker = isYear
    ? `<button data-anav="-1">${ICON.chevL}</button><div style="position:relative; font-size:15px; font-weight:500; display:inline-flex; align-items:center; justify-content:center;"><span>${analysisYear} 年 ▾</span>${yearSelectHtml}</div><button data-anav="1">${ICON.chevR}</button>`
    : `<button data-anav="-1">${ICON.chevL}</button><div style="position:relative; font-size:15px; font-weight:500; display:inline-flex; align-items:center; justify-content:center;"><span>${analysisYear} 年 ${analysisMonth+1} 月 ▾</span><input type="month" id="anaMonthPicker" value="${analysisYear}-${pad(analysisMonth+1)}" style="position:absolute; left:0; top:0; width:100%; height:100%; opacity:0; cursor:pointer; padding:0; margin:0;"></div><button data-anav="1">${ICON.chevR}</button>`;

  const barsHtml = catEntries.length ? catEntries.map(([cat,amt])=>{
    const pct = expense ? Math.round(amt/expense*100) : 0;
    return `<div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${catColor(cat)}"></div></div>
      <div class="bar-value">NT$ ${fmt(amt)} (${pct}%)</div>
    </div>`;
  }).join('') : `<div class="empty">${periodLabel}尚無支出紀錄</div>`;

  const trendSection = isYear ? `
    <div class="panel" style="margin-bottom:16px;">
      <p style="font-size:13px; color:var(--text-secondary); margin:0 0 14px;">每月收支趨勢</p>
      <div style="position:relative; height:220px;"><canvas id="trendChart"></canvas></div>
    </div>
  ` : '';

  document.getElementById('tab-analysis').innerHTML = `
    <div class="row-between">
      <h2 class="pagetitle">分析</h2>
      <div class="month-picker">${picker}</div>
    </div>
    <div class="toggle-group" style="max-width:220px; margin-bottom:16px;">
      <button type="button" class="toggle-btn ${!isYear?'active':''}" data-mode="month">月檢視</button>
      <button type="button" class="toggle-btn ${isYear?'active':''}" data-mode="year">年檢視</button>
    </div>
    <div class="cards" style="grid-template-columns:repeat(4,minmax(0,1fr));">
      <div class="card"><p class="label">${periodLabel}收入</p><p class="value text-pos">NT$ ${fmt(income)}</p></div>
      <div class="card"><p class="label">${periodLabel}支出</p><p class="value">NT$ ${fmt(expense)}</p></div>
      <div class="card"><p class="label">${periodLabel}結餘</p><p class="value">NT$ ${fmt(income-expense)}</p></div>
      <div class="card"><p class="label">儲蓄率</p><p class="value">${income?Math.round((income-expense)/income*100):0}%</p></div>
    </div>
    ${trendSection}
    <div class="panel">
      <p style="font-size:13px; color:var(--text-secondary); margin:0 0 14px;">分類佔比</p>
      <div style="position:relative; height:220px; margin-bottom:20px;"><canvas id="catChart"></canvas></div>
      ${barsHtml}
    </div>
  `;

  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click', ()=>{
    analysisMode = b.dataset.mode;
    renderAnalysis();
  }));
  document.querySelectorAll('[data-anav]').forEach(b=>b.addEventListener('click', ()=>{
    const dir = parseInt(b.dataset.anav);
    if(isYear){ analysisYear += dir; }
    else{
      analysisMonth += dir;
      if(analysisMonth<0){analysisMonth=11; analysisYear--;} if(analysisMonth>11){analysisMonth=0; analysisYear++;}
    }
    renderAnalysis();
  }));
  document.getElementById('anaYearPicker')?.addEventListener('change', (e) => {
    if(!e.target.value) return; analysisYear = parseInt(e.target.value, 10); renderAnalysis();
  });
  document.getElementById('anaMonthPicker')?.addEventListener('change', (e) => {
    if(!e.target.value) return;
    const [y, m] = e.target.value.split('-');
    analysisYear = parseInt(y, 10); analysisMonth = parseInt(m, 10) - 1; renderAnalysis();
  });

  if(analysisChart) analysisChart.destroy();
  const ctx = document.getElementById('catChart');
  if(catEntries.length){
    analysisChart = new Chart(ctx, {
      type:'doughnut',
      data:{ labels:catEntries.map(e=>e[0]), datasets:[{ data:catEntries.map(e=>e[1]), backgroundColor:catEntries.map(e=>catColor(e[0])), borderWidth:2, borderColor: getComputedStyle(document.documentElement).getPropertyValue('--surface') }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } } }
    });
  }

  if(trendChart){ trendChart.destroy(); trendChart = null; }
  if(isYear){
    const monthlyIncome = Array(12).fill(0), monthlyExpense = Array(12).fill(0);
    state.transactions.forEach(t=>{
      const d = new Date(t.date);
      if(d.getFullYear()!==analysisYear) return;
      if(t.type==='income') monthlyIncome[d.getMonth()] += t.amount;
      else monthlyExpense[d.getMonth()] += t.amount;
    });
    trendChart = new Chart(document.getElementById('trendChart'), {
      type:'bar',
      data:{
        labels:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
        datasets:[
          { label:'收入', data:monthlyIncome, backgroundColor:'#0F6E56' },
          { label:'支出', data:monthlyExpense, backgroundColor:'#D85A30' }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{ boxWidth:12, color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') } } },
        scales:{
          y:{ ticks:{ callback:v=>(v/1000)+'k', color: getComputedStyle(document.documentElement).getPropertyValue('--text-muted') }, grid:{ color: getComputedStyle(document.documentElement).getPropertyValue('--border') } },
          x:{ grid:{ display:false }, ticks:{ color: getComputedStyle(document.documentElement).getPropertyValue('--text-muted') } }
        }
      }
    });
  }
}

function openAccModal(editId){
  const editing = editId ? state.accounts.find(a=>a.id===editId) : null;
  const curBal = editing ? accountBalance(editing) : 0;
  openModal(`
    <h3>${editing?'修改帳戶':'新增帳戶'}</h3>
    <div class="field"><label>帳戶名稱</label><input type="text" id="f-accname" value="${editing?editing.name:''}" placeholder="例如：郵局存簿"></div>
    <div class="field"><label>目前餘額</label><input type="number" id="f-accbal" value="${editing?curBal:''}" placeholder="0"></div>
    <div class="modal-actions">
      <button class="btn" id="btnCancel">取消</button>
      <button class="btn btn-primary" id="btnSave">儲存</button>
    </div>
  `);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnSave').addEventListener('click', ()=>{
    const name = document.getElementById('f-accname').value.trim();
    if(!name){ alert('請輸入帳戶名稱'); return; }
    const newBal = parseFloat(document.getElementById('f-accbal').value)||0;
    if(editing){
      editing.name = name;
      const txnSum = curBal - editing.balance;
      editing.balance = newBal - txnSum;
    } else {
      state.accounts.push({id:uid(), name, balance:newBal});
    }
    closeModal(); renderAccounts();
  });
}

/* ---------- invest tab ---------- */
let investTrendChart = null;
function renderInvest(){
  const isYear = invMode === 'year';

  const scopedRecords = state.stockRecords.filter(r=>{
    const d = new Date(r.date);
    if(d.getFullYear()!==invYear) return false;
    return isYear ? true : d.getMonth()===invMonth;
  });
  const scopedFeeRecords = state.feeRecords.filter(r=>{
    const d = new Date(r.date);
    if(d.getFullYear()!==invYear) return false;
    return isYear ? true : d.getMonth()===invMonth;
  });

  const totalInvested = scopedRecords.reduce((s,r)=>s+r.invested,0);
  const totalFee = scopedFeeRecords.reduce((s,r)=>s+r.amount,0);
  const totalProfit = scopedRecords.reduce((s,r)=>s+r.profit,0);
  const totalPct = totalInvested ? (totalProfit/totalInvested*100) : 0;

  const wins = scopedRecords.filter(r=>r.profit>0);
  const losses = scopedRecords.filter(r=>r.profit<0);
  const avgWin = wins.length ? wins.reduce((s,r)=>s+r.profit,0)/wins.length : 0;
  const avgLoss = losses.length ? Math.abs(losses.reduce((s,r)=>s+r.profit,0))/losses.length : 0;
  let ratioLabel;
  if(wins.length===0 && losses.length===0) ratioLabel = '—';
  else if(losses.length===0) ratioLabel = '∞';
  else if(wins.length===0) ratioLabel = '0.00';
  else ratioLabel = (avgWin/avgLoss).toFixed(2);

  const periodLabel = isYear ? '本年' : '本月';
  const invYearSelectHtml = (() => {
    let opts = '';
    for(let y = 2015; y <= 2045; y++) {
      opts += `<option value="${y}" ${y === invYear ? 'selected' : ''}>${y} 年</option>`;
    }
    return `<select id="invYearPicker" style="position:absolute; left:0; top:0; width:100%; height:100%; opacity:0; cursor:pointer; padding:0; margin:0;">${opts}</select>`;
  })();

  const picker = isYear
    ? `<button data-invnav="-1">${ICON.chevL}</button><div style="position:relative; font-size:15px; font-weight:500; display:inline-flex; align-items:center; justify-content:center;"><span>${invYear} 年 ▾</span>${invYearSelectHtml}</div><button data-invnav="1">${ICON.chevR}</button>`
    : `<button data-invnav="-1">${ICON.chevL}</button><div style="position:relative; font-size:15px; font-weight:500; display:inline-flex; align-items:center; justify-content:center;"><span>${invYear} 年 ${invMonth+1} 月 ▾</span><input type="month" id="invMonthPicker" value="${invYear}-${pad(invMonth+1)}" style="position:absolute; left:0; top:0; width:100%; height:100%; opacity:0; cursor:pointer; padding:0; margin:0;"></div><button data-invnav="1">${ICON.chevR}</button>`;

  let bodyHtml;
  if(isYear){
    const monthlyInvested = Array(12).fill(0), monthlyProfit = Array(12).fill(0), monthlyFee = Array(12).fill(0);
    scopedRecords.forEach(r=>{
      const m = new Date(r.date).getMonth();
      monthlyInvested[m] += r.invested; monthlyProfit[m] += r.profit;
    });
    scopedFeeRecords.forEach(r=>{ monthlyFee[new Date(r.date).getMonth()] += r.amount; });
    
    const monthRows = monthlyInvested.map((inv,i)=>{
      const fee = monthlyFee[i], netProfit = monthlyProfit[i], pct = inv ? (netProfit/inv*100) : 0;
      if(!inv && !netProfit && !fee) return '';
      return `<tr>
        <td>${i+1} 月</td>
        <td>NT$ ${fmt2(inv)}</td>
        <td class="${fee>0?'text-pos':(fee<0?'text-neg':'')}">${fee>0?'+NT$ '+fmt2(fee):(fee<0?'-NT$ '+fmt2(Math.abs(fee)):'—')}</td>
        <td class="${netProfit>=0?'text-pos':'text-neg'}">${netProfit>=0?'+':''}NT$ ${fmt2(netProfit)}</td>
        <td class="${pct>=0?'text-pos':'text-neg'}">${pct>=0?'+':''}${pct.toFixed(2)}%</td>
      </tr>`;
    }).join('');
    bodyHtml = `
      <div class="panel" style="margin-bottom:16px;">
        <p style="font-size:13px; color:var(--text-secondary); margin:0 0 14px;">每月損益比較</p>
        <div style="position:relative; height:220px;"><canvas id="investTrendChart"></canvas></div>
      </div>
      <div class="panel">
        <table>
          <tr><th>月份</th><th>投入資金</th><th>淨手續費</th><th>淨損益</th><th>報酬率</th></tr>
          ${monthRows || '<tr><td colspan="5" class="empty">這一年還沒有紀錄</td></tr>'}
        </table>
      </div>
    `;
  } else {
    const records = scopedRecords.slice().sort((a,b)=> a.date<b.date?1:(a.date>b.date?-1:0));
    const rows = records.map(r=>{
      const pct = r.invested ? (r.profit/r.invested*100) : 0;
      return `<tr>
        <td>${fmtDate(r.date)}</td>
        <td>${r.name} <span style="color:var(--text-muted)">${r.symbol}</span></td>
        <td>NT$ ${fmt2(r.invested)}</td>
        <td class="${r.profit>=0?'text-pos':'text-neg'}">${r.profit>=0?'+':''}NT$ ${fmt2(r.profit)}</td>
        <td class="${pct>=0?'text-pos':'text-neg'}">${pct>=0?'+':''}${pct.toFixed(2)}%</td>
        <td><div class="txn-actions" style="justify-content:flex-end;"><button data-editstock="${r.id}">${ICON.edit}</button><button data-delstock="${r.id}">${ICON.trash}</button></div></td>
      </tr>`;
    }).join('');

    const feeRecordsList = scopedFeeRecords.slice().sort((a,b)=> a.date<b.date?1:(a.date>b.date?-1:0));
    const feeRows = feeRecordsList.map(r=>`
      <tr>
        <td>${fmtDate(r.date)}</td>

function allStockOptionsList(){
  const seen = new Set(); const options = [];
  TAIWAN_STOCKS.forEach(r=>{ if(!seen.has(r.symbol)){ seen.add(r.symbol); options.push(r); } });
  state.customStocks.forEach(r=>{ const key = r.symbol || r.name; if(!seen.has(key)){ seen.add(key); options.push(r); } });
  return options;
}

function resolveStock(raw){
  const v = (raw||'').trim();
  if(!v) return {name:'', symbol:''};
  const all = allStockOptionsList();
  let found = all.find(r=>r.symbol===v);
  if(found) return {name:found.name, symbol:found.symbol};
  found = all.find(r=>r.name===v);
  if(found) return {name:found.name, symbol:found.symbol};
  found = state.stockRecords.find(r=>r.symbol===v);
  if(found) return {name:found.name, symbol:found.symbol};
  found = state.stockRecords.find(r=>r.name===v);
  if(found) return {name:found.name, symbol:found.symbol};
  const m = v.match(/^(.*?)[\s\(（]+([A-Za-z0-9.]+)[\)）]?\s*$/);
  if(m){ return {name:m[1].trim(), symbol:m[2].trim()}; }
  return {name:v, symbol:''};
}

function openStockModal(editId){
  const editing = editId ? state.stockRecords.find(r=>r.id===editId) : null;
  const isCurrentViewedMonth = invYear===today.getFullYear() && invMonth===today.getMonth();
  const dval = editing ? editing.date : (isCurrentViewedMonth ? dateStr(today.getFullYear(),today.getMonth(),today.getDate()) : dateStr(invYear,invMonth,1));

  const seen = new Set(); const stockOptions = [];
  allStockOptionsList().forEach(r=>{ const key = r.symbol || r.name; if(!seen.has(key)){ seen.add(key); stockOptions.push(r.symbol ? `${r.name}（${r.symbol}）` : r.name); } });
  state.stockRecords.forEach(r=>{ const key = r.symbol||r.name; if(r.name && !seen.has(key)){ seen.add(key); stockOptions.push(r.symbol ? `${r.name}（${r.symbol}）` : r.name); } });
  const initialStockVal = editing ? (editing.symbol ? `${editing.name}（${editing.symbol}）` : editing.name) : '';

  openModal(`
    <h3>${editing?'編輯紀錄':'新增紀錄'}</h3>
    <div class="field"><label>日期</label><input type="date" id="f-date" value="${dval}"></div>
    <div class="field"><label>股票（打名稱或代碼都可以）</label><input type="text" id="f-stock" list="dl-stock" value="${initialStockVal}"><datalist id="dl-stock">${stockOptions.map(o=>`<option value="${o}">`).join('')}</datalist></div>
    <div class="field"><label>投入資金</label><input type="number" id="f-invested" value="${editing?editing.invested:''}" placeholder="0"></div>
    <div class="field"><label>獲利資金（虧損請輸入負數）</label><input type="number" id="f-profit" value="${editing?editing.profit:''}" placeholder="0"></div>
    <div class="modal-actions"><button class="btn" id="btnCancel">取消</button><button class="btn btn-primary" id="btnSave">儲存</button></div>
  `);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnSave').addEventListener('click', ()=>{
    const { name, symbol } = resolveStock(document.getElementById('f-stock').value);
    const invested = parseFloat(document.getElementById('f-invested').value);
    const profit = parseFloat(document.getElementById('f-profit').value);
    const date = document.getElementById('f-date').value;
    if(!name || !invested || isNaN(profit) || !date){ alert('請完整填寫欄位'); return; }
    const payload = { name, symbol, invested, profit, date };
    if(editing){ Object.assign(editing, payload); } else { state.stockRecords.push({id:uid(), ...payload}); }
    closeModal(); const d = new Date(date); invYear = d.getFullYear(); invMonth = d.getMonth(); renderInvest();
  });
}

function openFeeModal(editId){
  const editing = editId ? state.feeRecords.find(r=>r.id===editId) : null;
  const isCurrentViewedMonth = invYear===today.getFullYear() && invMonth===today.getMonth();
  const dval = editing ? editing.date : (isCurrentViewedMonth ? dateStr(today.getFullYear(),today.getMonth(),today.getDate()) : dateStr(invYear,invMonth,1));

  openModal(`
    <h3>${editing?'編輯手續費':'新增手續費'}</h3>
    <div class="field"><label>日期</label><input type="date" id="f-feedate" value="${dval}"></div>
    <div class="field"><label>金額（正數為加錢/退佣；負數為扣錢/手續費支出）</label><input type="number" id="f-feeamount" value="${editing?editing.amount:''}" placeholder="0"></div>
    <div class="field"><label>備註（選填）</label><input type="text" id="f-feenote" value="${editing?(editing.note||''):''}" placeholder="例如：開戶手續費或退佣"></div>
    <div class="modal-actions"><button class="btn" id="btnCancel">取消</button><button class="btn btn-primary" id="btnSave">儲存</button></div>
  `);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnSave').addEventListener('click', ()=>{
    const date = document.getElementById('f-feedate').value;
    const amount = parseFloat(document.getElementById('f-feeamount').value);
    const note = document.getElementById('f-feenote').value.trim();
    if(!date || isNaN(amount) || amount === 0){ alert('請輸入有效的日期與不為0的金額'); return; }
    const payload = { date, amount, note };
    if(editing){ Object.assign(editing, payload); } else { state.feeRecords.push({id:uid(), ...payload}); }
    closeModal(); const d = new Date(date); invYear = d.getFullYear(); invMonth = d.getMonth(); renderInvest();
  });
}

          ${sessionKey ? `

              <button class="btn btn-primary" id="btnChangePwd">更改密碼</button>

          ` : `
            <button class="btn btn-primary" id="btnSetPwd">設定密碼</button>
          `}
        </div>
      ` : ''}

    <div class="panel" style="margin-bottom:16px;">

          <div><div class="row-between" style="margin-bottom:6px;"><span style="font-size:13px; color:var(--text-secondary);">收入分類</span><button class="btn" data-addcat="income" style="padding:5px 10px; font-size:12px;">${ICON.plus}新增</button></div>${catRows('income')}</div>
        </div>
      ` : ''}
    </div>

    <div class="panel" style="margin-bottom:16px;">
      ${collapseHeader('stocks','股票清單管理')}
      ${settingsOpen.stocks ? `
        <div style="margin-top:14px;">
          <div class="row-between" style="margin-bottom:14px;"><span style="font-size:13px; color:var(--text-secondary);"></span><button class="btn" id="btnAddStockDef" style="padding:5px 10px; font-size:12px;">${ICON.plus}新增股票</button></div>
          ${stockMgmtRows()}
        </div>
      ` : ''}
    </div>
  `;

  document.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click', ()=>{ settingsOpen[b.dataset.toggle] = !settingsOpen[b.dataset.toggle]; renderSettings(); }));
  document.querySelectorAll('[data-catmove]').forEach(b=>b.addEventListener('click', ()=>{
    const [type, idxStr, dir] = b.dataset.catmove.split('|'); const i = parseInt(idxStr), j = i + parseInt(dir);
    const list = state.categories[type]; if(j<0 || j>=list.length) return; [list[i], list[j]] = [list[j], list[i]]; renderSettings();
  }));
  document.querySelectorAll('[data-addcat]').forEach(b=>b.addEventListener('click', ()=>openCatModal(b.dataset.addcat)));
  document.querySelectorAll('[data-editcat]').forEach(b=>b.addEventListener('click', ()=>{ openCatModal(b.dataset.editcat.split('|')[0], b.dataset.editcat.split('|')[1]); }));

  // 【密碼設定按鈕群】

      <div class="field"><label>輸入密碼</label><input type="password" id="f-newpwd" placeholder="輸入密碼"></div>

      if(p1!==p2) return alert('兩次密碼不一致');
      sessionKey = p1; saveState(); closeModal(); renderSettings();
      alert('已成功啟用密碼鎖！資料現在已被加密。');
    });
  });

  document.getElementById('btnChangePwd')?.addEventListener('click', ()=>{
    openModal(`
      <h3>更改密碼</h3>
      <div class="field"><label>舊密碼</label><input type="password" id="f-oldpwd" placeholder="輸入目前密碼"></div>

    `);

    document.getElementById('btnSavePwd').addEventListener('click', ()=>{

      alert('密碼更改成功！');
    });
  });

  document.getElementById('btnRemovePwd')?.addEventListener('click', ()=>{

      <div class="modal-actions"><button class="btn" id="btnCancelPwd">取消</button><button class="btn btn-danger" id="btnSavePwd" style="background:var(--danger); color:#fff;">確認移除</button></div>
    `);

    document.getElementById('btnSavePwd').addEventListener('click', ()=>{

      sessionKey = null; saveState(); closeModal(); renderSettings();
      alert('密碼已移除，資料已轉為未加密狀態。');
    });
  });

  // 【匯出 / 匯入 / 重設】
  document.getElementById('btnExport').addEventListener('click', async ()=>{

    // 如果有設密碼，匯出成加密版；如果沒設，直接匯出明文版
    let exportData;
    if(sessionKey){
      exportData = { version: 3, encryptedData: CryptoJS.AES.encrypt(JSON.stringify(state), sessionKey).toString() };
    } else {
      exportData = state;
    }
    const jsonStr = JSON.stringify(exportData, null, 2);
    const file = new File([jsonStr], fileName, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); return; } catch (e) { if(e.name === 'AbortError') return; }
    }
    try {
      const blob = new Blob([jsonStr], {type:'application/json'}); const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch (err) { alert('無法直接匯出！'); }
  });

  document.getElementById('btnImport').addEventListener('click', ()=>document.getElementById('importFile').click());

  document.getElementById('btnReset').addEventListener('click', ()=>{
    if(confirm('確定要清空所有資料嗎？此動作無法復原。')){
      state = {
        accounts:[], transactions:[], stockRecords:[], feeRecords:[],
        categories:{ expense: DEFAULT_EXPENSE_CATS.map(c=>({...c})), income: DEFAULT_INCOME_CATS.map(c=>({...c})) }, customStocks: []
      };
      renderAll();
    }
  });
}

document.getElementById('importFile').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if (data.version === 3 && data.encryptedData) {
        openModal(`
          <h3>解鎖備份檔案</h3>
          <p style="font-size:13px; color:var(--text-secondary); margin-bottom:12px;">此檔案受密碼保護，請輸入原密碼解鎖。</p>
          <div class="field"><label>密碼</label><input type="password" id="f-verifypass" placeholder="請輸入密碼"></div>
          <div class="modal-actions"><button class="btn" id="btnVerifyCancel">取消</button><button class="btn btn-primary" id="btnVerifySubmit">確認匯入</button></div>
        `);
        document.getElementById('btnVerifyCancel').addEventListener('click', ()=>{ closeModal(); document.getElementById('importFile').value = ''; });
        document.getElementById('btnVerifySubmit').addEventListener('click', ()=>{
          const vp = document.getElementById('f-verifypass').value;
          try {
            const bytes = CryptoJS.AES.decrypt(data.encryptedData, vp); const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
            if(!decryptedStr) throw new Error();
            state = JSON.parse(decryptedStr);
            sessionKey = vp; isLocked = false; saveState(); closeModal(); renderAll(); alert('匯入成功！系統已套用該檔案的密碼鎖。');
          } catch(err) { alert('密碼錯誤，無法解開此備份檔！'); }
        });
      } else {
        if(!data.categories) data.categories = { expense: DEFAULT_EXPENSE_CATS.map(c=>({...c})), income: DEFAULT_INCOME_CATS.map(c=>({...c})) };
        if(!data.accounts) data.accounts = []; if(!data.transactions) data.transactions = [];
        if(!data.stockRecords) data.stockRecords = []; if(!data.feeRecords) data.feeRecords = []; if(!data.customStocks) data.customStocks = [];
        state = data; isLocked = false; saveState(); renderAll(); alert('明文資料匯入成功！');
      }
    }catch(err){ alert('檔案格式錯誤，無法匯入'); e.target.value=''; }
  };
  reader.readAsText(file);
});

function openStockDefModal(editIdx){
  const editing = (editIdx!==undefined && editIdx!==null) ? state.customStocks[editIdx] : null;
  openModal(`
    <h3>${editing?'編輯股票':'新增股票'}</h3>
    <div class="field"><label>股票名稱</label><input type="text" id="f-defname" value="${editing?editing.name:''}" placeholder="例如：興櫃某某公司"></div>
    <div class="field"><label>股票代碼（選填）</label><input type="text" id="f-defsymbol" value="${editing?(editing.symbol||''):''}" placeholder="例如：1234"></div>
    <div class="modal-actions"><button class="btn" id="btnCancel">取消</button><button class="btn btn-primary" id="btnSave">儲存</button></div>
  `);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnSave').addEventListener('click', ()=>{
    const name = document.getElementById('f-defname').value.trim(), symbol = document.getElementById('f-defsymbol').value.trim();
    if(!name){ alert('請輸入股票名稱'); return; }
    if(state.customStocks.some((s,idx)=>(symbol?s.symbol===symbol:s.name===name)&&idx!==editIdx) || (symbol&&TAIWAN_STOCKS.some(s=>s.symbol===symbol))){ alert('這檔股票已經存在'); return; }
    if(editing){ editing.name = name; editing.symbol = symbol; } else { state.customStocks.push({name, symbol}); }
    closeModal(); renderSettings();
  });
}

function openCatModal(type, editName){
  const editing = editName ? state.categories[type].find(c=>c.name===editName) : null;
  let chosenColor = editing ? editing.color : CAT_PALETTE[state.categories[type].length % CAT_PALETTE.length];
  openModal(`
    <h3>${editing?'編輯分類':'新增'+(type==='expense'?'支出':'收入')+'分類'}</h3>
    <div class="field"><label>分類名稱</label><input type="text" id="f-catname" value="${editing?editing.name:''}" placeholder="例如：寵物"></div>
    <div class="field"><label>顏色</label><div id="colorSwatches" style="display:flex; gap:8px; flex-wrap:wrap;">
      ${CAT_PALETTE.map(c=>`<button type="button" class="colorswatch" data-color="${c}" style="width:28px;height:28px;border-radius:50%;background:${c};border:2px solid ${chosenColor===c?'var(--text)':'transparent'};padding:0;"></button>`).join('')}
    </div></div>
    <div class="modal-actions"><button class="btn" id="btnCancel">取消</button><button class="btn btn-primary" id="btnSave">儲存</button></div>
  `);
  document.querySelectorAll('.colorswatch').forEach(b=>b.addEventListener('click', ()=>{
    chosenColor = b.dataset.color; document.querySelectorAll('.colorswatch').forEach(x=>x.style.border='2px solid transparent'); b.style.border = '2px solid var(--text)';
  }));
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnSave').addEventListener('click', ()=>{
    const name = document.getElementById('f-catname').value.trim();
    if(!name){ alert('請輸入分類名稱'); return; }
    if(editing){
      const oldName = editing.name; editing.name = name; editing.color = chosenColor;
      if(oldName !== name){ state.transactions.forEach(t=>{ if(t.type===type && t.category===oldName) t.category = name; }); }
    } else {
      if(state.categories[type].some(c=>c.name===name)){ alert('這個分類已經存在'); return; }
      state.categories[type].push({name, color: chosenColor});
    }
    closeModal(); renderSettings();
  });
}

/* ---------- render all ---------- */
function renderAll(){
  saveState();
  renderCalendar();
  renderAnalysis();
  renderAccounts();
  renderInvest();
  renderSettings();
}
</script>
</body>
